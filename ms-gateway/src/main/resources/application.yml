server:
  port: 8091

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: ms-usuario
          uri: lb://MS-USUARIO
          predicates:
            - Path=/api/v1/usuarios/**
          filters:
            - name: RewritePath
              args:
                regexp: /api/v1/usuarios/(?<segment>.*)
                replacement: /api/usuarios/${segment}

        - id: ms-perfiles
          uri: lb://MS-PERFILES
          predicates:
            - Path=/api/v1/perfiles/**
          filters:
            - name: RewritePath
              args:
                regexp: /api/v1/perfiles/(?<segment>.*)
                replacement: /api/perfiles/${segment}

        - id: ms-vehiculos
          uri: lb://MS-VEHICULOS
          predicates:
            - Path=/api/v1/vehiculos/**
          filters:
