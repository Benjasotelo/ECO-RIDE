          filters:
            - name: RewritePath
              args:
                regexp: /api/v1/mantenimiento/(?<segment>.*)
                replacement: /api/mantenimiento/${segment}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.netty: DEBUG