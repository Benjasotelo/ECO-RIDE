  ms-precio:
    build: ./ms-precio
    container_name: ms-precio
    ports:
      - "8086:8086"
    environment:
      DB_HOST: mysql-precio
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ""
      EUREKA_URI: http://eureka-server:8761/eureka/
    depends_on:
      mysql-precio:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - ecoride-net

  ms-vehiculo:
    build: ./ms-vehiculo
    container_name: ms-vehiculo
    ports:
      - "8083:8083"
    environment:
      DB_HOST: mysql-vehiculo
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ""
      EUREKA_URI: http://eureka-server:8761/eureka/
    depends_on:
      mysql-vehiculo:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
