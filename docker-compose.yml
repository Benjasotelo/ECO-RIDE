  ms-pago:
    build: ./ms-pago
    container_name: ms-pago
    ports:
      - "8087:8087"
    environment:
      DB_HOST: mysql-pago
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ""
      EUREKA_URI: http://eureka-server:8761/eureka/
    depends_on:
      mysql-pago:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - ecoride-net

  ms-perfiles:
    build: ./ms-perfiles
    container_name: ms-perfiles
    ports:
      - "8082:8082"
    environment:
      DB_HOST: mysql-perfiles
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ""
      EUREKA_URI: http://eureka-server:8761/eureka/
    depends_on:
      mysql-perfiles:
        condition: service_healthy
      eureka-server:
