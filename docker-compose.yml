services:

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - ecoride-net

  ms-gateway:
    build: ./ms-gateway
    container_name: ms-gateway
    ports:
      - "8091:8091"
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
    networks:
      - ecoride-net

  # ---------- MySQL: un contenedor por microservicio ----------

  mysql-usuario:
    image: mysql:8.0
    container_name: mysql-usuario
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: ecoride_usuarios
    volumes:
      - mysql_usuario_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecoride-net

  mysql-calificaciones:
    image: mysql:8.0
    container_name: mysql-calificaciones
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: ecoride_calificaciones
    volumes:
      - mysql_calificaciones_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecoride-net

  mysql-geolocalizacion:
    image: mysql:8.0
    container_name: mysql-geolocalizacion
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: ecoride_geolocalizacion
    volumes:
      - mysql_geolocalizacion_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecoride-net

  mysql-mantenimiento:
    image: mysql:8.0
    container_name: mysql-mantenimiento
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: ecoride_mantenimiento
    volumes:
      - mysql_mantenimiento_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecoride-net

  mysql-notificaciones:
    image: mysql:8.0
    container_name: mysql-notificaciones
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: ecoride_notificaciones
    volumes:
      - mysql_notificaciones_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecoride-net

  mysql-pago:
    image: mysql:8.0
    container_name: mysql-pago
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: ecoride_pagos
    volumes:
      - mysql_pago_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecoride-net

  mysql-perfiles:
    image: mysql:8.0
    container_name: mysql-perfiles
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: ecoride_perfiles
    volumes:
      - mysql_perfiles_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecoride-net

  mysql-precio:
    image: mysql:8.0
    container_name: mysql-precio
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: ecoride_precios
    volumes:
      - mysql_precio_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecoride-net

  mysql-vehiculo:
    image: mysql:8.0
    container_name: mysql-vehiculo
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: ecoride_vehiculos
    volumes:
      - mysql_vehiculo_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecoride-net

  mysql-viaje:
    image: mysql:8.0
    container_name: mysql-viaje
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: ecoride_viajes
    volumes:
      - mysql_viaje_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecoride-net

  # ---------- Microservicios ----------

  ms-usuario:
    build: ./ms-usuario
    container_name: ms-usuario
    ports:
      - "8081:8081"
    environment:
      DB_HOST: mysql-usuario
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ""
      EUREKA_URI: http://eureka-server:8761/eureka/
    depends_on:
      mysql-usuario:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - ecoride-net

  ms-calificaciones:
    build: ./ms-calificaciones
    container_name: ms-calificaciones
    ports:
      - "8089:8089"
    environment:
      DB_HOST: mysql-calificaciones
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ""
      EUREKA_URI: http://eureka-server:8761/eureka/
    depends_on:
      mysql-calificaciones:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - ecoride-net

  ms-geolocalizacion:
    build: ./ms-geolocalizacion
    container_name: ms-geolocalizacion
    ports:
      - "8084:8084"
    environment:
      DB_HOST: mysql-geolocalizacion
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ""
      EUREKA_URI: http://eureka-server:8761/eureka/
    depends_on:
      mysql-geolocalizacion:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - ecoride-net

  ms-mantenimiento:
    build: ./ms-mantenimiento
    container_name: ms-mantenimiento
    ports:
      - "8090:8090"
    environment:
      DB_HOST: mysql-mantenimiento
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ""
      EUREKA_URI: http://eureka-server:8761/eureka/
    depends_on:
      mysql-mantenimiento:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - ecoride-net

  ms-notificaciones:
